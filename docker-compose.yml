services:

  backend:
    build:
      context: ./backend

    container_name: vidaplena-backend

    environment:
      DATABASE_URL: sqlite:////data/vidaplena.db
      ASYNC_DATABASE_URL: sqlite+aiosqlite:////data/vidaplena.db

    ports:
      - "8000:8000"

    volumes:
      - sqlite_data:/data

    restart: unless-stopped

    networks:
      - vidaplena-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000

    container_name: vidaplena-frontend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - vidaplena-network

volumes:
  sqlite_data:

networks:
  vidaplena-network:
    driver: bridge